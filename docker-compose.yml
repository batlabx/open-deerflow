# Self-hosted, keyless web search — the open-source swap for Tavily/Brave.
# `docker compose up -d` then set SEARXNG_URL=http://localhost:8080
services:
  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    volumes:
      - ./searxng:/etc/searxng:rw
    restart: unless-stopped
